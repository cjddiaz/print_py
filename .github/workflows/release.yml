name: Build & Release AgisLabels Pro

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on git tag: v2.0.0, v2.1.0, etc.

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # macOS build
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Create placeholder icon
        run: |
          mkdir -p docs
          python - <<'EOF'
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (512, 512), (26, 115, 232, 255))
          d = ImageDraw.Draw(img)
          d.text((60, 150), "AL", fill="white")
          img.save('docs/icon.png')
          EOF
          # Convert PNG to ICNS using sips
          mkdir -p docs/icon.iconset
          sips -z 16 16     docs/icon.png --out docs/icon.iconset/icon_16x16.png    2>/dev/null || true
          sips -z 32 32     docs/icon.png --out docs/icon.iconset/icon_32x32.png    2>/dev/null || true
          sips -z 128 128   docs/icon.png --out docs/icon.iconset/icon_128x128.png  2>/dev/null || true
          sips -z 256 256   docs/icon.png --out docs/icon.iconset/icon_256x256.png  2>/dev/null || true
          sips -z 512 512   docs/icon.png --out docs/icon.iconset/icon_512x512.png  2>/dev/null || true
          iconutil -c icns docs/icon.iconset -o docs/icon.icns 2>/dev/null || cp docs/icon.png docs/icon.icns

      - name: Build with PyInstaller
        run: pyinstaller AgisLabels.spec

      - name: Create DMG
        run: |
          hdiutil create -volname "AgisLabels Pro" \
            -srcfolder "dist/AgisLabels Pro.app" \
            -ov -format UDZO \
            "AgisLabels-Pro-macOS.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: AgisLabels-Pro-macOS.dmg

  # ────────────────────────────────────────────────────────────────────────────
  # Windows build
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Create placeholder icon
        shell: python
        run: |
          import os
          from PIL import Image
          os.makedirs('docs', exist_ok=True)
          img = Image.new('RGBA', (256, 256), (26, 115, 232, 255))
          img.save('docs/icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])

      - name: Build with PyInstaller
        run: pyinstaller AgisLabels.spec

      - name: Zip the output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\AgisLabels Pro\*" -DestinationPath "AgisLabels-Pro-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: AgisLabels-Pro-Windows.zip

  # ────────────────────────────────────────────────────────────────────────────
  # Linux build
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxkbcommon0 libegl1 libfontconfig1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller AgisLabels.spec

      - name: Package as tar.gz
        run: |
          tar -czf AgisLabels-Pro-Linux.tar.gz -C dist "AgisLabels Pro"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: AgisLabels-Pro-Linux.tar.gz

  # ────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "AgisLabels Pro ${{ steps.tag.outputs.TAG }}"
          body: |
            ## 🏷️ AgisLabels Pro ${{ steps.tag.outputs.TAG }}

            Software profesional de creación e impresión de etiquetas térmicas.

            ### 📦 Descargas

            | Sistema | Archivo | Descripción |
            |---|---|---|
            | 🪟 Windows | `AgisLabels-Pro-Windows.zip` | Descomprime y ejecuta `AgisLabels Pro.exe` |
            | 🍎 macOS | `AgisLabels-Pro-macOS.dmg` | Abre el DMG y arrastra a Aplicaciones |
            | 🐧 Linux | `AgisLabels-Pro-Linux.tar.gz` | Descomprime y ejecuta `./AgisLabels Pro` |

            ### ✨ Características
            - Editor WYSIWYG con Drag & Drop
            - Code128, QR, EAN13, EAN8, UPC-A, Code39
            - Variables dinámicas `{columna}` desde Excel
            - Contador serial automático `{SERIAL}`
            - Impresión masiva desde `.xlsx`
            - Catálogo de productos SQLite
            - Historial de impresiones
            - Proyectos `.agisproj` portátiles
            - Dark Mode profesional
          draft: false
          prerelease: false
          files: |
            release-assets/macos-dmg/AgisLabels-Pro-macOS.dmg
            release-assets/windows-zip/AgisLabels-Pro-Windows.zip
            release-assets/linux-tarball/AgisLabels-Pro-Linux.tar.gz
